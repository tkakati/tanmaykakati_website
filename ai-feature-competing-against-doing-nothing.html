<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>Your AI Feature Is Competing Against Doing Nothing | Journal</title>
    <meta
      name="description"
      content="A short essay on why most AI features compete against habit and inertia, and what product teams should optimize for to drive adoption."
    />

    <script>
      window.tailwind = window.tailwind || {};
      window.tailwind.config = {
        theme: {
          extend: {
            colors: {
              accent: "#BFD95A",
              accentMuted: "#7D9251",
            },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: #F4F4F1;
        color: #111111;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { createRoot } = ReactDOM;

      function PullQuote({ children }) {
        return (
          <blockquote className="my-12 border-l border-l-accentMuted/70 pl-4 pr-2 font-serif italic text-[1.18rem] leading-relaxed text-zinc-900">
            {children}
          </blockquote>
        );
      }

      function ProductCallout({ children }) {
        return (
          <div className="my-12">
            <div className="mb-3 text-[0.72rem] font-semibold uppercase tracking-[0.18em] text-zinc-500">
              Adoption reality
            </div>
            <blockquote className="border-l border-l-accentMuted/70 pl-4 pr-2 font-serif italic text-[1.18rem] leading-relaxed text-zinc-900">
              {children}
            </blockquote>
          </div>
        );
      }

      function NewsletterArticle() {
        var _a = React.useState(0), progress = _a[0], setProgress = _a[1];

        React.useEffect(function () {
          function update() {
            var el = document.documentElement;
            var scrollTop = window.pageYOffset || el.scrollTop || 0;
            var scrollHeight = el.scrollHeight - el.clientHeight;
            var p = scrollHeight > 0 ? scrollTop / scrollHeight : 0;
            setProgress(Math.min(1, Math.max(0, p)));
          }
          update();
          window.addEventListener("scroll", update, { passive: true });
          return function () {
            window.removeEventListener("scroll", update);
          };
        }, []);

        return (
          <div className="min-h-screen">
            <div className="sticky top-0 z-30 h-[3px] w-full bg-transparent">
              <div
                className="h-full bg-accent/90"
                style={{ width: Math.max(progress * 100, 2) + "%" }}
              />
            </div>

            <div className="mx-auto max-w-2xl px-4 sm:px-6 lg:px-8 py-10">
              <div className="flex items-center justify-start">
                <a
                  href="writing.html"
                  className="text-sm text-zinc-600 hover:text-zinc-900 transition-colors"
                >
                  ← Back to Journal
                </a>
              </div>

              <h1 className="mt-6 font-serif text-4xl sm:text-5xl leading-tight tracking-tight text-zinc-900">
                Your AI Feature Is Competing Against Doing Nothing
              </h1>

              <div className="mt-4 flex flex-wrap items-center gap-2 text-sm text-zinc-600">
                <span className="rounded-full border border-zinc-200 bg-white px-3 py-1">Product Strategy</span>
                <span aria-hidden="true" className="text-zinc-400">·</span>
                <span className="font-medium text-zinc-700">Mar 19, 2026</span>
                <span aria-hidden="true" className="text-zinc-400">·</span>
                <span className="font-medium text-zinc-700">2 min read</span>
              </div>

              <article className="mt-10">
                <h2 className="text-sm font-semibold uppercase tracking-wide text-zinc-500">
                  What I Expected
                </h2>
                <p className="text-zinc-800 leading-relaxed">
                  I expected people to compare output quality and switch if it was better.
                  I assumed a clean demo would do most of the work.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  What I noticed was the opposite.
                  Even when the output looked stronger, people often did nothing.
                  They went back to the path that felt cheapest in time and effort.
                </p>

                <h2 className="mt-10 text-sm font-semibold uppercase tracking-wide text-zinc-500">
                  The Surprise
                </h2>
                <p className="mt-6 text-zinc-800 leading-relaxed">
                  In my case, the strongest competitor was inertia.
                  A saved template, a quick search, or a quick message to a teammate felt safer than trying something new.
                  Doing nothing was often the default.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  That made the core idea clearer.
                  Your AI feature is not replacing the best tool.
                  It is replacing the easiest habit.
                </p>

                <ProductCallout>
                  In my tests, the moment the AI flow asked for extra steps, users quietly opted out.
                </ProductCallout>

                <p className="text-zinc-800 leading-relaxed">
                  The pattern showed up most clearly in writing workflows.
                  I saw people take a good draft, hesitate, and then reopen an old template.
                  The output was better, but the switch cost felt higher.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  Planning showed the same friction.
                  When a suggestion required extra verification or reformatting, people went back to their own docs.
                  The hesitation was about control, not about raw quality.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  I saw it again in light recruiting experiments.
                  A ranked list looked helpful, but if I could not explain the ranking quickly, I reached for manual review.
                  The fallback felt slower but safer.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  The cost of switching was not just time.
                  It was uncertainty.
                  If I could not see why the output looked the way it did, I hesitated and defaulted to the old habit.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  That is why “doing nothing” ends up as the incumbent.
                  It is low effort, low risk, and already understood.
                </p>

                <PullQuote>
                  Your strongest competitor is inertia.
                  Doing nothing is the incumbent.
                </PullQuote>

                <p className="text-zinc-800 leading-relaxed">
                  What changed for me was where I spent time.
                  I stopped polishing output first and started removing friction from the switch.
                  If the first useful action was not fast, adoption stalled.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  I focused on trust and editability.
                  I made it easier to see what informed the output and easier to correct it without starting over.
                  That reduced hesitation more than another round of model tuning.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  Integration mattered more than I expected.
                  Anything that lived outside the core flow was easy to ignore.
                  The closer the feature sat to the existing workflow, the more it got used.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  The metric that clarified it most was time to first useful action.
                  If the first win took too long or felt risky, people stopped trying.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  I used that as a filter for every change.
                  If it added steps, it needed to pay back immediately.
                  If it removed steps, usage tended to rise on its own.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  This is the realization I keep.
                  Output quality can be great and still lose to inertia.
                  The product only wins when switching feels safer than staying put.
                </p>
              </article>
            </div>
          </div>
        );
      }

      createRoot(document.getElementById("root")).render(<NewsletterArticle />);
    </script>
  </body>
</html>
