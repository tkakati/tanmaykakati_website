<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>You Don’t Have an AI Problem. You Have a Workflow Problem. | Writing</title>
    <meta
      name="description"
      content="A short essay on why many underperforming AI features are workflow failures, not model failures."
    />

    <script>
      window.tailwind = window.tailwind || {};
      window.tailwind.config = {
        theme: {
          extend: {
            colors: {
              accent: "#C9FF1A",
              accentMuted: "#6AA84F",
            },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <style>
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: #fcfcfa;
        color: #111111;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { createRoot } = ReactDOM;

      function PullQuote({ children }) {
        return (
          <blockquote className="my-12 border-l border-l-accentMuted/70 pl-4 pr-2 font-serif italic text-[1.18rem] leading-relaxed text-zinc-900">
            {children}
          </blockquote>
        );
      }

      function WorkflowCallout({ children }) {
        return (
          <div className="my-12 rounded-xl border border-zinc-200/80 bg-white/65 px-6 py-5">
            <div className="text-sm font-semibold tracking-wide text-zinc-700">Practical lens</div>
            <div className="mt-3 text-zinc-800 leading-relaxed">{children}</div>
          </div>
        );
      }

      function PlaceholderVisual() {
        return (
          <div className="my-12 rounded-xl border border-zinc-200/80 bg-zinc-50/70 px-5 py-6 text-sm text-zinc-600">
            [Optional image: Model output inside a broken workflow vs inside a well designed workflow]
          </div>
        );
      }

      function NewsletterArticle() {
        var _a = React.useState(0), progress = _a[0], setProgress = _a[1];

        React.useEffect(function () {
          function update() {
            var el = document.documentElement;
            var scrollTop = window.pageYOffset || el.scrollTop || 0;
            var scrollHeight = el.scrollHeight - el.clientHeight;
            var p = scrollHeight > 0 ? scrollTop / scrollHeight : 0;
            setProgress(Math.min(1, Math.max(0, p)));
          }
          update();
          window.addEventListener("scroll", update, { passive: true });
          return function () {
            window.removeEventListener("scroll", update);
          };
        }, []);

        return (
          <div className="min-h-screen">
            <div className="sticky top-0 z-30 h-[3px] w-full bg-transparent">
              <div
                className="h-full bg-accent/90"
                style={{ width: Math.max(progress * 100, 2) + "%" }}
              />
            </div>

            <div className="mx-auto max-w-2xl px-4 sm:px-6 lg:px-8 py-10">
              <div className="flex items-center justify-start">
                <a
                  href="writing.html"
                  className="text-sm text-zinc-600 hover:text-zinc-900 transition-colors"
                >
                  ← Back to writings
                </a>
              </div>

              <h1 className="mt-6 font-serif text-4xl sm:text-5xl leading-tight tracking-tight text-zinc-900">
                You Don’t Have an AI Problem. You Have a Workflow Problem.
              </h1>

              <div className="mt-4 flex flex-wrap items-center gap-2 text-sm text-zinc-600">
                <span className="rounded-full border border-zinc-200 bg-white px-3 py-1">Workflow Design</span>
                <span aria-hidden="true" className="text-zinc-400">·</span>
                <span className="font-medium text-zinc-700">Mar 31, 2026</span>
                <span aria-hidden="true" className="text-zinc-400">·</span>
                <span className="font-medium text-zinc-700">4 min read</span>
              </div>

              <article className="mt-10">
                <p className="text-zinc-800 leading-relaxed">
                  When an AI feature underperforms, teams often blame the model first.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  The instinct is predictable.
                  Output quality looks uneven, so the answer feels obvious.
                  Upgrade the model, refine the prompt, tune the temperature, rerun evals.
                  Sometimes that helps.
                  Often it does not fix the real problem.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  In many products, failure starts before the model and ends after the model.
                  Context is incomplete.
                  Handoffs are unclear.
                  Review is missing.
                  The user receives output but has no clear next step.
                  At that point, a stronger model only produces cleaner confusion.
                </p>

                <WorkflowCallout>
                  AI rarely creates value in isolation.
                  It creates value when embedded in a process people can trust and use repeatedly.
                </WorkflowCallout>

                <p className="text-zinc-800 leading-relaxed">
                  This is a workflow design issue, not just a model issue.
                  Good workflows define what goes in, what happens next, and who acts on the result.
                  They reduce ambiguity at each step.
                  They make output usable, not just impressive.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  Support tools show this clearly.
                  A model can generate solid draft replies.
                  But if the agent cannot see evidence, edit quickly, or escalate with one click, response quality will not matter much.
                  Agents revert to old macros because macros are predictable.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  Analytics products have the same pattern.
                  A model can summarize dashboard movement.
                  If the summary is detached from source metrics and action paths, teams ignore it.
                  They still open spreadsheets because that path is slower but controllable.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  Recruiting workflows offer another example.
                  AI ranking can surface strong candidates.
                  But if hiring managers cannot inspect why someone is ranked high, trust drops.
                  Without trust, adoption collapses.
                  Manual review returns.
                </p>

                <PlaceholderVisual />

                <p className="text-zinc-800 leading-relaxed">
                  The same issue shows up in internal content and planning tools.
                  Teams ask for generated plans, docs, and updates.
                  Output appears quickly.
                  Then work stalls because ownership is unclear and edit flow is weak.
                  No one knows whether to accept, revise, or route the output.
                  That is a workflow gap, not a language gap.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  This is why adoption, trust, speed, and usability often matter more than raw output quality.
                  If users cannot rely on the system in normal work conditions, they stop using it.
                  If they stop using it, quality gains do not compound.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  A practical correction is to design the workflow first, then place AI inside clear decision points.
                  Decide where generation helps and where deterministic logic should stay in control.
                  Define who owns review.
                  Define what gets auto accepted and what always needs human confirmation.
                  This reduces uncertainty and keeps accountability clear.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  Teams also need explicit interface design around AI output.
                  Show source context.
                  Show confidence signals where possible.
                  Make edits easy.
                  Keep regenerate and rollback visible.
                  Users trust systems they can steer.
                  They avoid systems that behave like black boxes.
                </p>

                <PullQuote>
                  AI exposes broken workflows.
                  It does not repair them.
                </PullQuote>

                <p className="text-zinc-800 leading-relaxed">
                  Product teams should start diagnosis with workflow checkpoints.
                  Where does context enter?
                  Where does verification happen?
                  Who approves?
                  What is the fallback path when confidence is low?
                  How quickly can a user correct output and move on?
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  These questions are practical and measurable.
                  You can instrument time to first useful result.
                  You can track edit burden.
                  You can monitor completion rate after generated output appears.
                  You can measure how often users abandon the AI path and return to manual flow.
                  Those metrics usually reveal the real bottleneck.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  Better models still matter.
                  But model gains should be applied inside a workflow that already works.
                  Otherwise you pay more for output that cannot be operationalized.
                  That is why teams feel stuck even after model upgrades.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  This framing also helps with prioritization.
                  Instead of asking only “how do we improve answer quality,” ask “where is work currently getting blocked.”
                  Sometimes the right fix is not a new model call.
                  It is better context collection, stronger handoff logic, or a faster review surface.
                  These changes are less flashy, but they often move core metrics faster.
                  They also lower rollout risk.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  The strongest AI products feel simple because the workflow is clear.
                  The right context is available.
                  The output is constrained.
                  The review path is obvious.
                  The next action is built in.
                  Users get value without needing to interpret the system.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  So when your AI feature struggles, pause before blaming model quality.
                  Check the process around it.
                  In most real products, the workflow decides whether AI becomes useful.
                </p>
              </article>
            </div>
          </div>
        );
      }

      createRoot(document.getElementById("root")).render(<NewsletterArticle />);
    </script>
  </body>
</html>
