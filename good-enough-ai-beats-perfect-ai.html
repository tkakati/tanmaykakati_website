<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>“Good Enough” AI Beats “Perfect” AI | Journal</title>
    <meta
      name="description"
      content="A short essay on why fast, dependable, useful AI often creates more product value than chasing perfect model output."
    />

    <script>
      window.tailwind = window.tailwind || {};
      window.tailwind.config = {
        theme: {
          extend: {
            colors: {
              accent: "#BFD95A",
              accentMuted: "#7D9251",
            },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: #F4F4F1;
        color: #111111;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { createRoot } = ReactDOM;

      function PullQuote({ children }) {
        return (
          <blockquote className="my-12 border-l border-l-accentMuted/70 pl-4 pr-2 font-serif italic text-[1.18rem] leading-relaxed text-zinc-900">
            {children}
          </blockquote>
        );
      }

      function ProgressCallout({ children }) {
        return (
          <div className="my-12">
            <div className="mb-3 text-[0.72rem] font-semibold uppercase tracking-[0.18em] text-zinc-500">
              Practical reminder
            </div>
            <blockquote className="border-l border-l-accentMuted/70 pl-4 pr-2 font-serif italic text-[1.18rem] leading-relaxed text-zinc-900">
              {children}
            </blockquote>
          </div>
        );
      }

      function NewsletterArticle() {
        var _a = React.useState(0), progress = _a[0], setProgress = _a[1];

        React.useEffect(function () {
          function update() {
            var el = document.documentElement;
            var scrollTop = window.pageYOffset || el.scrollTop || 0;
            var scrollHeight = el.scrollHeight - el.clientHeight;
            var p = scrollHeight > 0 ? scrollTop / scrollHeight : 0;
            setProgress(Math.min(1, Math.max(0, p)));
          }
          update();
          window.addEventListener("scroll", update, { passive: true });
          return function () {
            window.removeEventListener("scroll", update);
          };
        }, []);

        return (
          <div className="min-h-screen">
            <div className="sticky top-0 z-30 h-[3px] w-full bg-transparent">
              <div
                className="h-full bg-accent/90"
                style={{ width: Math.max(progress * 100, 2) + "%" }}
              />
            </div>

            <div className="mx-auto max-w-2xl px-4 sm:px-6 lg:px-8 py-10">
              <div className="flex items-center justify-start">
                <a
                  href="writing.html"
                  className="text-sm text-zinc-600 hover:text-zinc-900 transition-colors"
                >
                  ← Back to Journal
                </a>
              </div>

              <h1 className="mt-6 font-serif text-4xl sm:text-5xl leading-tight tracking-tight text-zinc-900">
                “Good Enough” AI Beats “Perfect” AI
              </h1>

              <div className="mt-4 flex flex-wrap items-center gap-2 text-sm text-zinc-600">
                <span className="rounded-full border border-zinc-200 bg-white px-3 py-1">Product Execution</span>
                <span aria-hidden="true" className="text-zinc-400">·</span>
                <span className="font-medium text-zinc-700">Mar 11, 2026</span>
                <span aria-hidden="true" className="text-zinc-400">·</span>
                <span className="font-medium text-zinc-700">1 min read</span>
              </div>

              <article className="mt-10">
                <p className="text-zinc-800 leading-relaxed">
                  What I expected was that the best output would win.
                  If the result looked perfect, people would adopt it.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  What surprised me was how often that failed.
                  When responses took ten seconds instead of two, people stopped waiting.
                  When the result needed extra fixing, they returned to older flows.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  In practice, that showed up as a simple tradeoff.
                  A fast, usable answer got used.
                  A better but slower answer got ignored.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  The most visible example for me was support drafts.
                  A 95 percent answer in two seconds beat a 99 percent answer in ten.
                  People would rather correct a small mistake than lose the flow.
                </p>

                <ProgressCallout>
                  Good enough won when it kept momentum.
                </ProgressCallout>

                <p className="text-zinc-800 leading-relaxed">
                  I saw the same pattern in writing tools.
                  A reliable draft that appeared quickly got edited and shipped.
                  A more polished draft that appeared late often got skipped.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  Analytics was another place it showed up.
                  A quick, directional summary led to action.
                  A perfect narrative that arrived later did not.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  The pattern became hard to ignore.
                  When I chased perfect output, I added steps, latency, and review overhead.
                  Usage dropped even as quality improved.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  What changed for me was where I focused.
                  I started optimizing for time to first usable action and ease of correction.
                  That improved real usage faster than another round of tuning.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  That shift made the tradeoff tangible.
                  A fast, reviewable output that people trusted created progress.
                  A perfect output that arrived late created friction.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  I stopped framing it as quality versus quality.
                  It was speed, control, and flow versus theoretical perfection.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  That is when the line landed for me.
                  Users do not buy perfection.
                  They buy progress.
                </p>

                <PullQuote>
                  Users do not buy perfection.
                  They buy progress.
                </PullQuote>

                <p className="text-zinc-800 leading-relaxed">
                  The thing that shipped, got used, and improved kept winning.
                  The thing that waited for perfection did not.
                </p>
              </article>
            </div>
          </div>
        );
      }

      createRoot(document.getElementById("root")).render(<NewsletterArticle />);
    </script>
  </body>
</html>
