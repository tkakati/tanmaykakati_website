<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>Workflows First. Agents Second. — Writing</title>
    <meta
      name="description"
      content="A short, thoughtful essay on why workflows belong at the center of most AI systems—and agents belong only at the edges."
    />

    <script>
      window.tailwind = window.tailwind || {};
      window.tailwind.config = {
        theme: {
          extend: {
            colors: {
              accent: "#C9FF1A",
              accentMuted: "#6AA84F",
            },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      body {
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        background: #fcfcfa;
        color: #111111;
      }
      .pull-quote {
        border-left: 4px solid rgba(106, 168, 79, 0.85);
        padding-left: 1.1rem;
        padding-right: 0.75rem;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { createRoot } = ReactDOM;

      function PullQuote({ children }) {
        return (
          <blockquote className="my-12 border-l border-l-accentMuted/70 pl-4 pr-2 font-serif italic text-[1.18rem] leading-relaxed text-zinc-900">
            {children}
          </blockquote>
        );
      }

      function ArchitectureHighlight({ children }) {
        return (
          <div className="my-14 mx-auto w-full max-w-2xl rounded-xl border border-zinc-200/80 bg-white/60 px-6 py-6 text-center">
            <div className="font-serif text-[1.35rem] leading-snug text-zinc-900">{children}</div>
          </div>
        );
      }

      function SimpleRule() {
        return (
          <div className="my-12">
            <div className="text-zinc-900 font-medium leading-relaxed">
              If you can define the steps, use a workflow
              <br />
              If you cannot, introduce an agent carefully
            </div>
          </div>
        );
      }

      function NewsletterArticle() {
        var _a = React.useState(0), progress = _a[0], setProgress = _a[1];

        React.useEffect(function () {
          function update() {
            var el = document.documentElement;
            var scrollTop = window.pageYOffset || el.scrollTop || 0;
            var scrollHeight = el.scrollHeight - el.clientHeight;
            var p = scrollHeight > 0 ? scrollTop / scrollHeight : 0;
            setProgress(Math.min(1, Math.max(0, p)));
          }
          update();
          window.addEventListener("scroll", update, { passive: true });
          return function () {
            window.removeEventListener("scroll", update);
          };
        }, []);

        return (
          <div className="min-h-screen">
            <div className="sticky top-0 z-30 h-[3px] w-full bg-transparent">
              <div
                className="h-full bg-accent/90"
                style={{ width: Math.max(progress * 100, 2) + "%" }}
              />
            </div>

            <div className="mx-auto max-w-2xl px-4 sm:px-6 lg:px-8 py-10">
              <div className="flex items-center justify-start">
                <a
                  href="writing.html"
                  className="text-sm text-zinc-600 hover:text-zinc-900 transition-colors"
                >
                  ← Back to writings
                </a>
              </div>

              <h1 className="mt-6 font-serif text-4xl sm:text-5xl leading-tight tracking-tight text-zinc-900">
                Workflows First. Agents Second.
              </h1>

              <div className="mt-4 flex flex-wrap items-center gap-2 text-sm text-zinc-600">
                <span className="rounded-full border border-zinc-200 bg-white px-3 py-1">Workflow Design</span>
                <span aria-hidden="true" className="text-zinc-400">
                  ·
                </span>
                <span className="font-medium text-zinc-700">Feb 02, 2026</span>
                <span aria-hidden="true" className="text-zinc-400">
                  ·
                </span>
                <span className="font-medium text-zinc-700">2 min read</span>
              </div>

              <article className="mt-10">
                <p className="text-zinc-800 leading-relaxed">
                  Most AI demos feel magical.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  You type something vague. The system figures out what to do. It searches, reasons, loops, and gives you an answer that feels intelligent.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  Then you try to ship it.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  Latency shows up. Costs rise. Outputs vary. What felt smart in the demo starts feeling unpredictable in production.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  This is where most teams realize something simple.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  They built an agent where they needed a workflow.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  Anthropic puts it cleanly.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  A workflow is a system where the steps are predefined. The path is known.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  An agent is a system that decides what to do next based on a goal and current state.
                </p>

                <PullQuote>
                  One follows a path.
                  <br />
                  The other figures out the path.
                </PullQuote>

                <p className="text-zinc-800 leading-relaxed">
                  Agents feel powerful because they handle ambiguity. You don’t define the steps. The system does.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  But that flexibility comes at a cost. More latency. Higher cost. Less predictability. Harder debugging.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  And most product surfaces don’t need that trade.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  Workflows don’t feel magical. But they work.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  They are reliable, predictable, and cheap. If your system can take an input, transform it, and produce an output, you almost always want a workflow.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  That’s the backbone of most good AI systems.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  Agents still matter. But only at the edges.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  Use them when the path is unclear. Research, exploration, reasoning. Not execution.
                </p>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  The best systems combine both:
                </p>

                <ArchitectureHighlight>Workflow → Agent → Workflow</ArchitectureHighlight>

                <p className="mt-6 text-zinc-800 leading-relaxed">
                  A simple rule helps.
                </p>

                <SimpleRule />
              </article>
            </div>
          </div>
        );
      }

      createRoot(document.getElementById("root")).render(<NewsletterArticle />);
    </script>
  </body>
</html>
