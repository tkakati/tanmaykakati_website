<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <title>Projects — Tanmay K</title>
    <meta
      name="description"
      content="A selection of work across AI and product systems."
    />
    <meta name="theme-color" content="#C9FF1A" />

    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#content">Skip to content</a>

    <header class="topbar" id="topbar">
      <div class="container topbar__inner">
        <a class="brand" href="index.html" aria-label="Home">
          <span class="brand__mark" aria-hidden="true">✦</span>
          <span class="brand__text">Tanmay K</span>
        </a>

        <div class="nav-wrap" id="navWrap">
          <button
            class="nav-toggle"
            type="button"
            aria-label="Open menu"
            aria-expanded="false"
            aria-controls="megaMenu"
            data-action="toggleNav"
          >
            <span aria-hidden="true">Menu</span>
          </button>

          <nav class="nav" id="primaryNav" aria-label="Primary">
            <a class="nav__link" href="projects.html" data-mega-target="projects">Projects</a>
            <a class="nav__link" href="frameworks.html" data-mega-target="frameworks">Frameworks</a>
            <a class="nav__link" href="writing.html" data-mega-target="writing">Journal</a>
          </nav>
        </div>

        <div class="topbar__cta">
          <a class="button button--primary" href="index.html#contact">Get in touch</a>
        </div>
      </div>

      <div class="mega" id="megaMenu" aria-label="Site navigation">
        <div class="container mega__inner">
          <div class="mega__grid">
            <section class="mega__section" aria-label="Projects" data-mega-section="projects">
              <h3 class="mega__heading">PROJECTS</h3>
              <a class="mega__link" href="projects.html#ai">AI</a>
              <a class="mega__link" href="projects.html#product-teardown">Product Teardown</a>
            </section>
            <section class="mega__section" aria-label="Frameworks" data-mega-section="frameworks">
              <h3 class="mega__heading">FRAMEWORKS</h3>
              <a class="mega__link" href="frameworks.html#discovery">Discovery</a>
              <a class="mega__link" href="frameworks.html#decisioning">Decisioning</a>
              <a class="mega__link" href="frameworks.html#ai-systems">AI Systems</a>
            </section>
            <section class="mega__section" aria-label="Journal" data-mega-section="writing">
              <h3 class="mega__heading">WRITING</h3>
              <a class="mega__link" href="writing.html#tech-business">Tech &amp; Business</a>
              <a class="mega__link" href="writing.html#personal">Personal</a>
            </section>
          </div>
        </div>
      </div>
    </header>

    <main id="content">
      <section class="section" id="projects">
        <div class="container">
          <div class="section__header">
            <h1 class="section__title">Projects</h1>
            <p class="section__subtitle">A selection of work across AI and product systems.</p>
          </div>

          <div class="projects-tabs" role="tablist" aria-label="Filter projects">
            <button type="button" class="projects-tabs__btn projects-tabs__btn--active" role="tab" aria-selected="true" data-filter="all">All</button>
            <button type="button" class="projects-tabs__btn" role="tab" aria-selected="false" data-filter="ai">AI</button>
            <button type="button" class="projects-tabs__btn" role="tab" aria-selected="false" data-filter="product-teardown">Product Teardown</button>
          </div>

          <div class="grid grid--cards" id="projectsGrid" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container footer__inner">
        <p class="tiny">© <span id="year"></span> Tanmay K</p>
        <a class="tiny link" href="index.html">Home</a>
      </div>
    </footer>

    <dialog class="modal" id="caseStudyModal" aria-label="Case study">
      <div class="modal__inner">
        <div class="modal__header">
          <h3 class="modal__title" id="modalTitle">Case study</h3>
          <button class="icon-button" type="button" data-action="closeModal" aria-label="Close">
            <span aria-hidden="true">×</span>
          </button>
        </div>
        <div class="modal__content" id="modalContent"></div>
      </div>
    </dialog>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/framer-motion@12/dist/framer-motion.js" crossorigin></script>
    <script src="./script.js"></script>
  </body>
</html>
